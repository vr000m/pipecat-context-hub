name: CI

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feature/**"
      - "bug/**"
      - "refactor/**"
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.9.18"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Ruff
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/ tests/

      - name: Pytest
        run: uv run pytest tests/ -v

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "0.9.18"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Dependency Audit
        run: uv run pip-audit --local --progress-spinner off --ignore-vuln CVE-2026-4539

      - name: Bandit
        run: uv run bandit -r src

      - name: Generate SBOM
        run: |
          mkdir -p artifacts/security
          uv run cyclonedx-py environment --output-reproducible --of JSON -o artifacts/security/sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/security/sbom.json
